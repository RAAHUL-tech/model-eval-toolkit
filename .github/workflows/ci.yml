# Runs tests on every PR and on pushes to main.
# Publishes to PyPI only after tests pass on a push to main (not on PR builds).
# The `pypi` environment can require manual approval (Settings → Environments → pypi).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,pdf]"

      - name: Run tests
        run: |
          pytest -q

  # Publish only when merging / pushing to main (same ref as protected branch).
  # Does NOT run for pull_request events (fork PRs must not use publish secrets).
  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: pypi
      url: https://pypi.org/project/model-eval-toolkit/

    permissions:
      contents: read
      # For PyPI "Trusted Publishing" (OIDC). Safe to keep; not required if you only use an API token.
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
